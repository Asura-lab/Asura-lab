<svg xmlns="http://www.w3.org/2000/svg" width="495" height="195" viewBox="0 0 495 195" role="img" aria-label="GitHub contribution stats">
  <style>
    text { font-family: 'Segoe UI', Ubuntu, system-ui, -apple-system, sans-serif; }
    .num { font-weight: 800; font-size: 30px; fill: #e6e6f0; }
    .lbl { font-weight: 600; font-size: 13px; fill: #a78bfa; letter-spacing: .3px; }
    .sub { font-weight: 400; font-size: 11px; fill: #7a86a8; }
    @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
    /* fill-mode "both" fades in when animation runs, but leaves content fully
       visible (opacity 1) on any renderer that ignores animations. */
    .col { animation: fadein .7s ease both; }
    .c1 { animation-delay: .10s; }
    .c2 { animation-delay: .25s; }
    .c3 { animation-delay: .40s; }
  </style>

  <rect x="0.5" y="0.5" width="494" height="194" rx="10" fill="#0d1126" stroke="#a78bfa" stroke-opacity="0.25"/>
  <line x1="165" y1="46" x2="165" y2="176" stroke="#a78bfa" stroke-opacity="0.15"/>
  <line x1="330" y1="46" x2="330" y2="176" stroke="#a78bfa" stroke-opacity="0.15"/>

  <g class="col c1" text-anchor="middle">
    <text x="82.5" y="84" class="num">377</text>
    <text x="82.5" y="130" class="lbl">Total Contributions</text>
    <text x="82.5" y="152" class="sub">Feb 16, 2025 - Present</text>
  </g>

  <g class="col c2" text-anchor="middle">
    <circle cx="247.5" cy="74" r="38" fill="none" stroke="#a78bfa" stroke-opacity="0.12" stroke-width="2"/>
    <circle cx="247.5" cy="74" r="33" fill="none" stroke="#23284a" stroke-width="4.5"/>
    <circle cx="247.5" cy="74" r="33" fill="none" stroke="#a78bfa" stroke-width="4.5" stroke-linecap="round"
            stroke-dasharray="29.6 999" transform="rotate(-90 247.5 74)"/>
    <text x="247.5" y="84" class="num">1</text>
    <text x="247.5" y="130" class="lbl">Current Streak</text>
    <text x="247.5" y="152" class="sub">Jun 14 - Jun 14</text>
  </g>

  <g class="col c3" text-anchor="middle">
    <text x="412.5" y="84" class="num">7</text>
    <text x="412.5" y="130" class="lbl">Longest Streak</text>
    <text x="412.5" y="152" class="sub">Feb 21 - Feb 27</text>
  </g>
</svg>
